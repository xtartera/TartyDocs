site_name: Sistemes Operatius en Xarxa

site_description: Manual docent · 2n CFGM Sistemes Microinformàtics i Xarxes (SMX)
site_author: Xavi Tartera

theme:
  name: material
  language: ca

  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Canvia a mode fosc
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Canvia a mode clar

  font:
    text: Roboto
    code: Roboto Mono

  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.integrate

